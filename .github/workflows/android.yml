name: Release Android

on:
  workflow_dispatch:
    inputs:
      version:
        description: "版本号 (例如 v0.1.0)。需与桌面 release 的 tag 一致才能合并产物"
        required: true
        default: "v0.1.0"
      draft:
        description: "Release 是否创建为草稿（如已存在则忽略）"
        required: true
        default: "true"

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    env:
      NDK_VERSION: "26.3.11579264"
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-34 build-tools;34.0.0 ndk;${{ env.NDK_VERSION }}"

      - name: Export NDK env
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/${NDK_VERSION}" >> $GITHUB_ENV
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/${NDK_VERSION}" >> $GITHUB_ENV

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          key: android-aarch64

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Install Tauri CLI
        run: pnpm add -D @tauri-apps/cli@latest

      - name: Init Android project
        run: pnpm tauri android init
        env:
          NDK_HOME: ${{ env.NDK_HOME }}

      - name: Build APK (debug-signed release)
        # 不传 --apk --aab 默认会产 apk；--target aarch64 仅出 arm64-v8a
        # 这里用 --debug 让 CI 自动用 debug keystore 签名（用户已确认 debug 签名）
        run: pnpm tauri android build --target aarch64 --apk --debug
        env:
          NDK_HOME: ${{ env.NDK_HOME }}

      - name: Locate APK
        id: locate
        run: |
          set -e
          APK=$(find src-tauri/gen/android -type f -name "*.apk" | head -n1)
          if [ -z "$APK" ]; then
            echo "no apk produced" >&2
            find src-tauri/gen/android -type d -name "outputs" -exec ls -laR {} +
            exit 1
          fi
          DEST="cpemgr-rs-${{ inputs.version }}-android-arm64-v8a.apk"
          cp "$APK" "$DEST"
          echo "apk=$DEST" >> "$GITHUB_OUTPUT"
          ls -la "$DEST"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: ${{ inputs.version }}
          draft: ${{ inputs.draft == 'true' }}
          files: ${{ steps.locate.outputs.apk }}
          fail_on_unmatched_files: true
