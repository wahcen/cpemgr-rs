name: Release Android

on:
  workflow_dispatch:
    inputs:
      version:
        description: "版本号 (例如 v0.1.0)。需与桌面 release 的 tag 一致才能合并产物"
        required: true
        default: "v0.1.0"
      draft:
        description: "Release 是否创建为草稿（如已存在则忽略）"
        required: true
        default: "true"

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    env:
      NDK_VERSION: "26.3.11579264"
      # 仓库内固定 keystore 路径（由维护者预先生成并 commit）
      KEYSTORE_PATH: ".github/keystore/release.keystore"
      KEY_ALIAS: "cpemgr"
      # ⚠️ 该 keystore 仅用于 OSS 项目签名一致性，不承担安全用途；
      #    密码公开等同 Android 默认 debug keystore 的处理方式
      KEYSTORE_PASSWORD: "cpemgr-rs"
      KEY_PASSWORD: "cpemgr-rs"
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-34 build-tools;34.0.0 ndk;${{ env.NDK_VERSION }}"

      - name: Export NDK env
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/${NDK_VERSION}" >> $GITHUB_ENV
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/${NDK_VERSION}" >> $GITHUB_ENV

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          key: android-aarch64-release

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Init Android project
        run: pnpm tauri android init
        env:
          NDK_HOME: ${{ env.NDK_HOME }}

      - name: Verify keystore exists
        run: |
          if [ ! -f "$KEYSTORE_PATH" ]; then
            echo "::error::Missing $KEYSTORE_PATH — 请按 README 生成并 commit 后再发版"
            exit 1
          fi

      - name: Inject signing config
        # tauri android init 生成的 app/build.gradle.kts 默认只有 debug signing。
        # 这里在 android { } 块末尾追加 signingConfigs.release + buildTypes.release.signingConfig，
        # 全部从环境变量读（无需顶级 val / properties 文件），最自包含。
        env:
          CPEMGR_KEYSTORE_PATH: ${{ github.workspace }}/${{ env.KEYSTORE_PATH }}
        run: |
          set -e
          GRADLE="src-tauri/gen/android/app/build.gradle.kts"
          test -f "$GRADLE" || { echo "::error::$GRADLE not found after tauri android init"; exit 1; }

          python3 - <<'PY'
          import re, pathlib
          p = pathlib.Path("src-tauri/gen/android/app/build.gradle.kts")
          src = p.read_text()

          # 全部 inline 写在 android {} 内部，不依赖任何顶级 val
          inject = r'''
              signingConfigs {
                  create("release") {
                      val storePath = System.getenv("CPEMGR_KEYSTORE_PATH")
                      if (storePath != null && storePath.isNotEmpty()) {
                          storeFile = file(storePath)
                          storePassword = System.getenv("CPEMGR_KEYSTORE_PASSWORD") ?: ""
                          keyAlias = System.getenv("CPEMGR_KEY_ALIAS") ?: ""
                          keyPassword = System.getenv("CPEMGR_KEY_PASSWORD") ?: ""
                      }
                  }
              }
              buildTypes {
                  getByName("release") {
                      signingConfig = signingConfigs.getByName("release")
                  }
              }
          '''

          if "// cpemgr-rs:signing-injected" in src:
              print("signing block already injected, skipping")
          else:
              # 找到顶层 android { 的配平结束 }
              m = re.search(r'\bandroid\s*\{', src)
              if not m:
                  raise SystemExit("android { block not found in build.gradle.kts")
              start = m.end()
              depth = 1
              i = start
              while i < len(src) and depth > 0:
                  ch = src[i]
                  if ch == '{':
                      depth += 1
                  elif ch == '}':
                      depth -= 1
                  i += 1
              if depth != 0:
                  raise SystemExit("android { } not balanced")
              # 在 android 闭合 } 之前插入
              marker = "    // cpemgr-rs:signing-injected\n"
              src = src[:i-1] + marker + inject + src[i-1:]
              p.write_text(src)
              print("injected signing config OK")
          PY

          echo "--- build.gradle.kts (full) ---"
          cat "$GRADLE"

      - name: Build release APK (signed)
        # 不传 --debug → 走 [profile.release] + 上面注入的 release signingConfig
        run: pnpm tauri android build --target aarch64 --apk
        env:
          NDK_HOME: ${{ env.NDK_HOME }}
          CPEMGR_KEYSTORE_PATH: ${{ github.workspace }}/${{ env.KEYSTORE_PATH }}
          CPEMGR_KEYSTORE_PASSWORD: ${{ env.KEYSTORE_PASSWORD }}
          CPEMGR_KEY_ALIAS: ${{ env.KEY_ALIAS }}
          CPEMGR_KEY_PASSWORD: ${{ env.KEY_PASSWORD }}

      - name: Locate APK
        id: locate
        run: |
          set -e
          # release APK 路径形如 .../outputs/apk/universalRelease/app-universal-release.apk
          # 或 arm64Release。统一找最新的 *.apk
          APK=$(find src-tauri/gen/android -type f -name "*-release.apk" \
                | grep -v unsigned | head -n1 || true)
          if [ -z "$APK" ]; then
            echo "no signed release apk found; listing outputs:" >&2
            find src-tauri/gen/android -type d -name "outputs" -exec ls -laR {} +
            exit 1
          fi
          DEST="cpemgr-rs-${{ inputs.version }}-android-arm64-v8a.apk"
          cp "$APK" "$DEST"
          ls -la "$DEST"
          echo "Size: $(du -h "$DEST" | cut -f1)"
          echo "apk=$DEST" >> "$GITHUB_OUTPUT"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: ${{ inputs.version }}
          draft: ${{ inputs.draft == 'true' }}
          files: ${{ steps.locate.outputs.apk }}
          fail_on_unmatched_files: true
